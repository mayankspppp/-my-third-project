<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Business Analytics Dashboard</title>
  <link rel="stylesheet" href="style.css">

  <!-- Chart.js CDN -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<header>
  <h1>📊 Business Analytics Dashboard</h1>
  <p>Real-time Data Insights for Business Growth</p>
</header>

<section class="cards">
  <div class="card">
    <h2>Total Sales</h2>
    <p id="sales">0</p>
  </div>

  <div class="card">
    <h2>Total Profit</h2>
    <p id="profit">0</p>
  </div>

  <div class="card">
    <h2>Customers</h2>
    <p id="customers">0</p>
  </div>
</section>

<section class="chart-container">
  <canvas id="salesChart"></canvas>
</section>

<script src="script.js"></script>
</body>
</html>
